version: 2

models:
  - name: account_insights
    description: >
      Business-ready Gold model providing account-level commercial insights.
      Each row represents one customer account and contains aggregated sales,
      interaction, and revenue KPIs for reporting and dashboarding.

    columns:

      - name: account_key
        description: Surrogate key for the customer account.
        tests:
          - unique
          - not_null

      - name: account_id
        description: Business identifier for the customer account.
        tests:
          - not_null

      - name: account_name
        description: Name of the customer account.
        tests:
          - not_null

      - name: account_type
        description: Type of customer account (Hospital, Pharmacy, Clinic).

      - name: city
        description: City where the account is located.

      - name: state
        description: State where the account is located.

      - name: region
        description: Sales region assigned to the account.

      - name: total_orders
        description: Total number of orders placed by the account.

      - name: total_quantity
        description: Total quantity purchased by the account.

      - name: total_revenue
        description: Total revenue generated by the account.

      - name: avg_revenue_per_order
        description: Average revenue generated per order.

      - name: total_interactions
        description: Total number of sales interactions with the account.

      - name: last_order_date
        description: Date of the most recent order.

      - name: last_interaction_date
        description: Date of the most recent sales interaction.

  - name: product_performance
    description: >
      Business-ready Gold model providing product-level commercial insights.
      Each row represents one product and contains aggregated sales,
      inventory, and product performance KPIs for reporting and analytics.

    columns:

      - name: product_key
        description: Surrogate key for the product.
        tests:
          - unique
          - not_null

      - name: product_id
        description: Business identifier for the product.
        tests:
          - not_null

      - name: product_name
        description: Name of the pharmaceutical product.
        tests:
          - not_null

      - name: brand
        description: Product manufacturer or brand.

      - name: category
        description: Therapeutic category of the product.

      - name: total_orders
        description: Total number of orders placed for the product.

      - name: total_quantity_sold
        description: Total quantity sold across all orders.

      - name: total_revenue
        description: Total revenue generated by the product.

      - name: avg_revenue_per_order
        description: Average revenue generated per order for the product.

      - name: current_stock
        description: Latest available inventory quantity for the product.

      - name: stock_status
        description: Business classification of inventory level (High, Medium, Low).

      - name: last_order_date
        description: Date of the most recent order placed for the product.

      - name: inventory_snapshot_date
        description: Date of the latest inventory snapshot.

      - name: revenue_rank
        description: Revenue ranking of the product based on total revenue.

  - name: territory_insights
    description: >
      Business-ready Gold model providing territory-level commercial insights.
      Each row represents one sales territory and contains aggregated sales,
      customer interaction, and executive KPI metrics for reporting.

    columns:

      - name: territory
        description: Sales territory.
        tests:
          - unique
          - not_null

      - name: total_orders
        description: Total number of orders placed within the territory.

      - name: total_quantity
        description: Total quantity sold within the territory.

      - name: total_revenue
        description: Total revenue generated by the territory.

      - name: total_interactions
        description: Total customer interactions recorded for the territory.

      - name: revenue_contribution_percent
        description: Percentage contribution of the territory to overall company revenue.

      - name: revenue_rank
        description: Revenue ranking of the territory.

      - name: last_order_date
        description: Date of the latest order within the territory.

      - name: last_interaction_date
        description: Date of the latest customer interaction within the territory.